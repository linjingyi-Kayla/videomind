<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#0A84FF" />
    <link rel="manifest" href="/manifest.json" />
    <title>VideoRemind</title>
    <style>
      :root{
        --bg:#fafafa;
        --text:#111111;
        --muted:#6b6b6b;
        --muted2:#9a9a9a;
        --border:rgba(0,0,0,0.06);
      }

      body{
        margin:0;
        font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
        background: linear-gradient(135deg, #f5f5dc 0%, #e8e8d0 100%);
        color:var(--text);
      }

      header{
        position:sticky;
        top:0;
        background:rgba(255,255,255,0.72);
        backdrop-filter: blur(14px);
        border-bottom:1px solid var(--border);
        padding:16px;
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:12px;
      }

      .brand{
        font-family:"Playfair Display","Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
        font-weight:600;
        letter-spacing:0.12em;
        font-size:16px;
      }

      .btn{
        background:rgba(255,255,255,0.92);
        color:#000000;
        border:1px solid rgba(0,0,0,0.8);
        padding:10px 14px;
        border-radius:8px;
        cursor:pointer;
        font-weight:600;
        backdrop-filter: blur(10px);
      }
      .btn:disabled{
        opacity:0.6;
        cursor:not-allowed;
      }

      .content{
        padding:16px;
      }

      .toolbar{
        display:flex;
        gap:10px;
        flex-wrap:wrap;
        align-items:center;
        margin-bottom:10px;
      }

      .search{
        flex: 1;
        min-width: 180px;
        background: rgba(255,255,255,0.6);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 8px 10px;
        backdrop-filter: blur(14px);
      }

      input[type="search"]{
        width:100%;
        padding:10px 12px;
        border:0;
        border-radius:12px;
        background: transparent;
        color:#111;
        font-size:14px;
        outline:none;
      }

      input[type="search"]::placeholder{
        color:#b0b0b0;
      }

      select{
        flex: 0 0 140px;
        padding:10px 12px;
        border:1px solid var(--border);
        border-radius:12px;
        background: rgba(255,255,255,0.65);
        color:#111;
        font-size:14px;
        outline:none;
      }

      .tagbar{
        display:flex;
        gap:8px;
        flex-wrap:wrap;
        margin-bottom:14px;
        padding:0 2px;
      }
      .tag{
        border:1px solid var(--border);
        background: rgba(255,255,255,0.65);
        border-radius:999px;
        padding:7px 12px;
        font-size:13px;
        color:var(--muted);
        cursor:pointer;
        user-select:none;
        transition: transform 0.08s ease, background 0.12s ease, border-color 0.12s ease;
      }
      .tag:active{ transform: translateY(1px); }
      .tag.selected{
        border-color: rgba(0,0,0,0.18);
        background: rgba(255,255,255,0.9);
        color:#111;
        font-weight:700;
      }

      .columns{
        display:grid;
        grid-template-columns:repeat(2, 1fr);
        gap:14px;
      }

      @media (min-width: 1024px){
        .columns{ grid-template-columns:repeat(3, 1fr); }
      }

      .card{
        background:rgba(255,255,255,0.62);
        border:1px solid rgba(0,0,0,0.04);
        border-radius:16px;
        padding:10px;
        box-shadow:0 6px 18px rgba(0,0,0,0.04);
        position:relative;
        overflow:hidden;
        display:flex;
        flex-direction:column;
        min-height:150px;
        backdrop-filter: blur(10px);
      }

      .card::after{
        content:"";
        position:absolute;
        inset:-2px;
        background:
          radial-gradient(circle at 15% 10%, rgba(245, 158, 182, 0.28), transparent 55%),
          radial-gradient(circle at 90% 15%, rgba(157, 215, 214, 0.20), transparent 55%),
          radial-gradient(circle at 70% 95%, rgba(200, 160, 255, 0.18), transparent 55%);
        opacity:0.55;
        pointer-events:none;
      }

      .card > *{
        position:relative;
        z-index:1;
      }

      .cover{
        width:100%;
        height:132px;
        object-fit:cover;
        border-radius:14px;
        background:rgba(0,0,0,0.03);
        margin-bottom:8px;
      }

      .titleLink{
        color:var(--text);
        text-decoration:none;
        font-size:15px;
        font-weight:800;
        margin-bottom:8px;
        display:-webkit-box;
        -webkit-line-clamp:2;
        -webkit-box-orient:vertical;
        overflow:hidden;
      }

      .meta{
        margin-top:auto;
        color:var(--muted);
        font-size:12.5px;
        display:flex;
        align-items:center;
        gap:6px;
        padding:8px 10px;
        border-radius:14px;
        border:1px solid rgba(0,0,0,0.05);
        background:rgba(255,255,255,0.55);
      }

      .metaBtn{
        cursor:pointer;
        user-select:none;
      }
      .metaBtn:active{ transform: translateY(1px); }

      .title{
        font-size:14px;
        font-weight:800;
        margin-bottom:10px;
        display:-webkit-box;
        -webkit-line-clamp:2;
        -webkit-box-orient:vertical;
        overflow:hidden;
      }

      .summary{
        color:var(--muted);
        font-size:13px;
        line-height:1.5;
        white-space:pre-wrap;
        overflow:hidden;
        max-height:62px; /* 默认 3 行左右 */
        transition: max-height 260ms ease;
      }

      .summary.expanded{
        max-height:240px;
      }

      .pill{
        display:inline-block;
        padding:4px 10px;
        border-radius:999px;
        font-size:12px;
        border:1px solid rgba(0,0,0,0.05);
        color:#444;
        font-weight:700;
        background:rgba(255,255,255,0.55);
        width:fit-content;
      }
      .pill.done{
        border-color:rgba(47,156,83,0.35);
        background:rgba(47,156,83,0.10);
        color:#1f7a3b;
      }
      .pill.pending{
        border-color:rgba(29,111,216,0.32);
        background:rgba(29,111,216,0.08);
        color:#1b56a4;
      }
      .pill.error{
        border-color:rgba(217,48,37,0.35);
        background:rgba(217,48,37,0.08);
        color:#b42318;
      }

      .empty{
        color:var(--muted2);
        padding:18px;
        text-align:center;
        font-size:14px;
      }

      @media (max-width: 640px){
        .columns{ grid-template-columns:repeat(2, 1fr); }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">VideoRemind</div>
      <button id="notifyBtn" class="btn">开启手机提醒</button>
    </header>

    <div class="content">
      <div class="toolbar">
        <div class="search">
          <input id="searchInput" type="search" placeholder="搜索标题/总结" />
        </div>
        <select id="statusFilter" aria-label="状态过滤">
          <option value="all">全部</option>
          <option value="pending">Pending</option>
          <option value="done">Done</option>
          <option value="error">Error</option>
        </select>
      </div>
      <div id="categoryTags" class="tagbar" aria-label="分类标签栏"></div>
      <div id="history" class="columns"></div>
      <div id="empty" class="empty" style="display:none;">暂无任务</div>
    </div>

    <script>
      const notifyBtn = document.getElementById('notifyBtn');
      const historyEl = document.getElementById('history');
      const emptyEl = document.getElementById('empty');
      const searchInput = document.getElementById('searchInput');
      const statusFilter = document.getElementById('statusFilter');
      const categoryTagsEl = document.getElementById('categoryTags');

      let selectedCategory = 'all';

      let lastItems = [];

      function getSubscriptionId() {
        return localStorage.getItem('subscription_id');
      }

      function setSubscriptionId(id) {
        localStorage.setItem('subscription_id', id);
      }

      function base64ToUint8Array(base64String) {
        const padding = '='.repeat((4 - base64String.length % 4) % 4);
        const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
        const rawData = window.atob(base64);
        const outputArray = new Uint8Array(rawData.length);
        for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
        return outputArray;
      }

      async function fetchVapidPublicKey() {
        const resp = await fetch('/api/vapid-public-key');
        const data = await resp.json();
        return data.publicKey;
      }

      async function subscribePush() {
        if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
          alert('当前浏览器不支持 Web Push');
          return;
        }

        const permission = await Notification.requestPermission();
        if (permission !== 'granted') {
          alert('通知权限未开启');
          return;
        }

        const reg = await navigator.serviceWorker.ready;
        const publicKey = await fetchVapidPublicKey();

        const applicationServerKey = base64ToUint8Array(publicKey);
        const sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey
        });

        const resp = await fetch('/api/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(sub)
        });
        if (!resp.ok) {
          const text = await resp.text();
          throw new Error(text || 'subscribe failed');
        }
        const data = await resp.json();
        setSubscriptionId(data.subscription_id);
        await refreshHistory();
      }

      function renderStatusPill(status) {
        const pill = document.createElement('div');
        if (status === 'done') pill.className = 'pill done';
        else if (status === 'error') pill.className = 'pill error';
        else pill.className = 'pill pending';
        pill.textContent = status || 'pending';
        pill.style.position = 'absolute';
        pill.style.top = '12px';
        pill.style.right = '12px';
        pill.addEventListener('click', (e) => e.stopPropagation());
        return pill;
      }

      function makeTimePickerOverlay(taskId, initial, onSave) {
        const overlay = document.createElement('div');
        overlay.id = 'vm-time-overlay';
        overlay.style.position = 'fixed';
        overlay.style.inset = '0';
        overlay.style.background = 'rgba(0,0,0,0.35)';
        overlay.style.zIndex = '99999';
        overlay.style.display = 'flex';
        overlay.style.alignItems = 'flex-end';
        overlay.style.justifyContent = 'center';
        overlay.style.padding = '12px';

        const sheet = document.createElement('div');
        sheet.style.width = '100%';
        sheet.style.maxWidth = '420px';
        sheet.style.background = '#ffffff';
        sheet.style.borderRadius = '16px';
        sheet.style.padding = '12px';
        sheet.style.boxShadow = '0 10px 30px rgba(0,0,0,0.15)';

        const header = document.createElement('div');
        header.style.display = 'flex';
        header.style.alignItems = 'center';
        header.style.justifyContent = 'space-between';
        header.style.marginBottom = '10px';

        const title = document.createElement('div');
        title.style.fontWeight = '800';
        title.textContent = '修改提醒时间';

        const cancel = document.createElement('button');
        cancel.type = 'button';
        cancel.textContent = '取消';
        cancel.style.border = '1px solid #eee';
        cancel.style.background = '#fff';
        cancel.style.borderRadius = '10px';
        cancel.style.padding = '8px 10px';
        cancel.style.cursor = 'pointer';
        cancel.addEventListener('click', () => overlay.remove());

        header.appendChild(title);
        header.appendChild(cancel);

        const row = document.createElement('div');
        row.style.display = 'flex';
        row.style.alignItems = 'center';
        row.style.gap = '10px';

        const picker = document.createElement('input');
        picker.type = 'time';
        picker.value = initial;
        picker.style.flex = '1';
        picker.style.padding = '10px 8px';
        picker.style.border = '1px solid #eee';
        picker.style.borderRadius = '12px';

        const saveBtn = document.createElement('button');
        saveBtn.type = 'button';
        saveBtn.textContent = '保存';
        saveBtn.style.border = '1px solid #000';
        saveBtn.style.background = '#000';
        saveBtn.style.color = '#fff';
        saveBtn.style.borderRadius = '10px';
        saveBtn.style.padding = '10px 14px';
        saveBtn.style.cursor = 'pointer';
        saveBtn.style.fontWeight = '700';
        saveBtn.addEventListener('click', async () => {
          try {
            await onSave(picker.value);
            overlay.remove();
          } catch (e) {
            alert('更新提醒失败：' + (e && e.message ? e.message : e));
          }
        });

        row.appendChild(picker);
        row.appendChild(saveBtn);

        sheet.appendChild(header);
        sheet.appendChild(row);
        overlay.appendChild(sheet);

        overlay.addEventListener('click', (e) => {
          if (e.target === overlay) overlay.remove();
        });

        document.body.appendChild(overlay);
        setTimeout(() => {
          try {
            if (typeof picker.showPicker === 'function') picker.showPicker();
          } catch (e) {}
          picker.focus();
        }, 0);
      }

      function extractYouTubeId(url) {
        try {
          const u = new URL(url);
          if (u.hostname.includes('youtu.be')) return u.pathname.replace('/', '').split('/')[0];
          const v = u.searchParams.get('v');
          if (v) return v;
          const parts = u.pathname.split('/').filter(Boolean);
          if (parts[0] === 'shorts' || parts[0] === 'live') return parts[1] || null;
          return null;
        } catch (e) {
          return null;
        }
      }

      function coverForVideoUrl(videoUrl) {
        const id = extractYouTubeId(videoUrl || '');
        if (!id) return '';
        // 使用 YouTube 静态封面：不需要额外 API
        return `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
      }

      function displayTitleForTask(it) {
        // 标题缺失时不再展示视频 ID，统一提示“未命名视频”
        if (it.title) return it.title;
        return '未命名视频';
      }

      async function updateRemindAt(taskId, hhmm) {
        const resp = await fetch(`/api/tasks/${encodeURIComponent(taskId)}/remind-at`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ remind_at: hhmm })
        });
        if (!resp.ok) {
          const text = await resp.text();
          throw new Error(text || '更新提醒失败');
        }
        return await resp.json();
      }

      async function refreshHistory() {
        const subscriptionId = getSubscriptionId();

        // 即使本地没有 subscription_id，也让后端根据“最新订阅”兜底返回历史任务
        const historyUrl = subscriptionId
          ? '/api/history?subscription_id=' + encodeURIComponent(subscriptionId)
          : '/api/history';
        const resp = await fetch(historyUrl);
        if (!resp.ok) {
          historyEl.innerHTML = '';
          emptyEl.style.display = '';
          return [];
        }
        const data = await resp.json();
        const items = data.items || [];
        lastItems = items;

        // 动态生成分类标签栏
        const categories = Array.from(new Set((items || []).map((x) => x.category || '未分类'))).sort();
        if (selectedCategory !== 'all' && !categories.includes(selectedCategory)) selectedCategory = 'all';

        categoryTagsEl.innerHTML = '';
        const mkTag = (value, label) => {
          const tag = document.createElement('div');
          tag.className = 'tag' + (selectedCategory === value ? ' selected' : '');
          tag.textContent = label;
          tag.addEventListener('click', () => {
            selectedCategory = value;
            refreshHistory().catch(() => {});
          });
          return tag;
        };
        categoryTagsEl.appendChild(mkTag('all', '全部分类'));
        for (const c of categories) categoryTagsEl.appendChild(mkTag(c, c));

        const filtered = applyFilters(items);

        historyEl.innerHTML = '';
        emptyEl.style.display = filtered.length ? 'none' : '';

        const alarmSvg = `
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2Z" fill="#9a9a9a"/>
            <path d="M6.88 6.31 5.64 5.07a1 1 0 0 0-1.41 1.41l1.24 1.24A9.96 9.96 0 0 0 2 13h2c0-1.81.65-3.47 1.73-4.78Z" fill="#9a9a9a" opacity="0.35"/>
            <path d="M17.12 17.69 18.36 18.93a1 1 0 0 0 1.41-1.41l-1.24-1.24A9.96 9.96 0 0 0 22 11h-2c0 1.81-.65 3.47-1.73 4.78Z" fill="#9a9a9a" opacity="0.35"/>
            <path d="M12 8v5l3 2" stroke="#9a9a9a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 2a10 10 0 0 0-7.07 17.07A10 10 0 1 0 12 2Z" stroke="#9a9a9a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        `.trim();

        for (const it of filtered) {
          const card = document.createElement('div');
          card.className = 'card';
          card.dataset.taskId = it.id;

          const title = document.createElement('div');
          const titleText = displayTitleForTask(it);
          const videoUrl = it.video_url || '';

          const coverUrl = coverForVideoUrl(videoUrl);
          if (coverUrl) {
            const img = document.createElement('img');
            img.className = 'cover';
            img.loading = 'lazy';
            img.alt = titleText;
            img.src = coverUrl;
            img.style.cursor = 'pointer';
            img.addEventListener('click', (e) => {
              e.stopPropagation();
              window.location.href = videoUrl;
            });
            card.appendChild(img);
          }

          const titleLink = document.createElement('a');
          titleLink.className = 'titleLink';
          titleLink.textContent = titleText;
          titleLink.href = videoUrl;
          titleLink.target = '_blank';
          titleLink.addEventListener('click', (e) => e.stopPropagation());
          card.appendChild(titleLink);

          card.appendChild(renderStatusPill(it.status));

          if (it.summary) {
            const summary = document.createElement('div');
            summary.className = 'summary';
            summary.textContent = it.summary;
            card.appendChild(summary);

            // 点击卡片展开/收起总结（除非点到标题/封面/时间）
            card.addEventListener('click', () => {
              const expanded = summary.classList.toggle('expanded');
              // 可选：记录展开状态到 dataset
              card.dataset.expanded = expanded ? '1' : '0';
            });
          }

          const meta = document.createElement('div');
          meta.className = 'meta';
          meta.classList.add('metaBtn');
          meta.innerHTML = alarmSvg + '<span>提醒时间：' + (it.remind_at_hhmm || '未设置') + '</span>';
          card.appendChild(meta);

          // 时间选择器：用遮罩底部弹出，iOS 上交互更稳定
          meta.addEventListener('click', async (e) => {
            e.stopPropagation();
            const taskId = it.id;
            const initial = it.remind_at_hhmm || '18:30';
            makeTimePickerOverlay(taskId, initial, async (hhmm) => {
              await updateRemindAt(taskId, hhmm);
              await refreshHistory();
            });
          });

          historyEl.appendChild(card);
        }

        return filtered;
      }

      function applyFilters(items) {
        const q = (searchInput && searchInput.value ? searchInput.value.trim().toLowerCase() : '');
        const st = statusFilter ? statusFilter.value : 'all';
        const cat = selectedCategory || 'all';

        return (items || []).filter((it) => {
          if (st !== 'all' && (it.status || '').toLowerCase() !== st) return false;
          if (cat !== 'all') {
            const itemCat = it.category || '未分类';
            if (itemCat !== cat) return false;
          }
          if (q) {
            const hay = `${it.title || ''} ${it.summary || ''} ${it.video_url || ''}`.toLowerCase();
            if (!hay.includes(q)) return false;
          }
          return true;
        });
      }

      // 用户手动筛选时立即刷新渲染（不重新请求）
      let rerenderTimer = null;
      function scheduleRerender() {
        if (rerenderTimer) clearTimeout(rerenderTimer);
        rerenderTimer = setTimeout(() => {
          refreshHistory().catch(() => {});
        }, 300);
      }

      if (searchInput) searchInput.addEventListener('input', () => scheduleRerender());
      if (statusFilter) statusFilter.addEventListener('change', () => refreshHistory().catch(() => {}));
      // 分类标签点击后会直接触发 refreshHistory()

      notifyBtn.addEventListener('click', async () => {
        notifyBtn.disabled = true;
        try {
          await subscribePush();
        } catch (e) {
          alert('订阅失败：' + (e && e.message ? e.message : e));
        } finally {
          notifyBtn.disabled = false;
        }
      });

      // service-worker 可能需要显式注册；如果已注册不会重复生效
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/service-worker.js').catch(console.error);
      }

      // 自动轮询，避免用户等待/刷新丢失进度
      refreshHistory()
        .then(() => {
          window.__vm_poll = setInterval(async () => {
            try {
              const items = await refreshHistory();
              const hasPending = (items || []).some((x) => x.status === 'pending');
              if (!hasPending && window.__vm_poll) {
                clearInterval(window.__vm_poll);
                window.__vm_poll = null;
              }
            } catch (e) {
              // 静默：不影响页面使用
            }
          }, 6000);
        })
        .catch(console.error);
    </script>
  </body>
</html>
