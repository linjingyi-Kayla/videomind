<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#ebe6df" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="manifest" href="/manifest.json" />
    <title>收藏 · VideoMind</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      :root {
        --cream: rgb(249, 249, 247);
        --cream-deep: #ebe8e2;
        --text: #2c2a2d;
        --muted: #6b6568;
        --accent-sage: #5a6d5e;
        --accent-dust: #6b5d6e;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
        background: var(--cream);
        background-image:
          linear-gradient(180deg, rgba(245, 240, 248, 0.35) 0%, transparent 42%),
          linear-gradient(165deg, var(--cream) 0%, #f2efe9 55%, var(--cream-deep) 100%);
        color: var(--text);
        position: relative;
      }
      body::before {
        content: "";
        position: fixed;
        pointer-events: none;
        left: 0;
        right: 0;
        top: 0;
        height: min(72vh, 620px);
        z-index: 0;
        background:
          radial-gradient(ellipse 140% 100% at 50% -8%, rgba(230, 195, 215, 0.16) 0%, transparent 55%),
          radial-gradient(ellipse 85% 75% at -5% 12%, rgba(195, 218, 205, 0.14) 0%, transparent 48%),
          radial-gradient(ellipse 85% 75% at 105% 15%, rgba(205, 195, 228, 0.15) 0%, transparent 48%),
          radial-gradient(ellipse 60% 50% at 70% 0%, rgba(255, 230, 235, 0.1) 0%, transparent 45%),
          linear-gradient(180deg, transparent 0%, var(--cream) 92%);
      }
      header {
        position: sticky;
        top: 0;
        z-index: 50;
        background: rgba(249, 248, 245, 0.82);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(180, 165, 175, 0.12);
        padding: 14px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .brand {
        font-family: "Playfair Display", "Iowan Old Style", Georgia, serif;
        font-weight: 700;
        letter-spacing: 0.12em;
        font-size: 24px;
        color: transparent;
        background: linear-gradient(118deg, #4a4248 0%, #6b5d68 38%, #4d5a50 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      header a {
        font-size: 14px;
        color: var(--accent-sage);
        text-decoration: none;
        font-weight: 600;
      }
      .content {
        position: relative;
        z-index: 1;
        padding: 10px 12px 88px;
        max-width: 1200px;
        margin: 0 auto;
        width: 100%;
        overflow-x: hidden;
      }
      .columns {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        column-gap: 14px;
        row-gap: 14px;
        align-items: start;
        width: 100%;
      }
      @media (min-width: 1024px) {
        .columns {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }
      .card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(1px);
        -webkit-backdrop-filter: blur(1px);
        border-radius: 22px;
        padding: 16px 16px 14px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03), 0 -1px 0 rgba(255, 255, 255, 1);
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-height: 0;
        min-width: 0;
        align-self: start;
        width: 100%;
      }
      .card-body {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
      }
      .card-media {
        margin: -16px -16px 12px -16px;
        border-radius: 24px 24px 0 0;
        overflow: hidden;
        background: linear-gradient(145deg, #e8e6e2 0%, #dde8df 50%, #e6e2ea 100%);
        aspect-ratio: 16/9;
        position: relative;
      }
      .cover {
        width: 100%;
        max-width: 100%;
        height: 100%;
        position: absolute;
        inset: 0;
        object-fit: cover;
        object-position: center;
      }
      .titleLink {
        color: var(--text);
        text-decoration: none;
        font-size: 15px;
        font-weight: 800;
        margin-bottom: 6px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .summary {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
        white-space: pre-wrap;
        overflow: hidden;
        max-height: 62px;
        cursor: pointer;
      }
      .summary-hint {
        font-size: 11px;
        color: #9a8fa0;
        margin-top: 4px;
      }
      .meta {
        margin-top: auto;
        color: var(--muted);
        font-size: 12.5px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 16px;
        border: 1px solid rgba(185, 195, 185, 0.25);
        background: linear-gradient(180deg, rgba(245, 248, 244, 0.9) 0%, rgba(238, 236, 242, 0.65) 100%);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
      }
      .metaBtn {
        cursor: pointer;
        user-select: none;
      }
      .pill {
        position: absolute;
        top: 12px;
        right: 12px;
        padding: 5px 11px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        z-index: 2;
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 1px 4px rgba(80, 95, 85, 0.08);
      }
      .pill.done {
        color: #3d5248;
        background: rgba(175, 198, 185, 0.65);
        border-color: rgba(255, 255, 255, 0.55);
      }
      .pill.pending {
        color: #4a5568;
        background: rgba(185, 192, 212, 0.55);
        border-color: rgba(255, 255, 255, 0.45);
      }
      .pill.error {
        color: #6b4548;
        background: rgba(215, 185, 185, 0.5);
        border-color: rgba(255, 255, 255, 0.4);
      }
      .empty {
        text-align: center;
        color: #888;
        padding: 40px 16px;
        font-size: 14px;
      }
      .bottom-nav {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 80;
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding: 8px 8px calc(10px + env(safe-area-inset-bottom));
        background: rgba(248, 246, 242, 0.92);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border-top: 1px solid rgba(190, 175, 195, 0.15);
        box-shadow: 0 -6px 24px rgba(85, 70, 95, 0.06);
      }
      .bottom-nav a {
        flex: 1;
        text-align: center;
        text-decoration: none;
        color: #7a7278;
        font-size: 11px;
        padding: 6px 4px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }
      .bottom-nav a.active {
        color: var(--accent-sage);
        font-weight: 800;
      }
      .bottom-nav svg {
        width: 24px;
        height: 24px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.8;
      }
    </style>
  </head>
  <body>
    <header>
      <span class="brand">收藏</span>
      <a href="/">回首页</a>
    </header>
    <div class="content">
      <div id="list" class="columns"></div>
      <div id="empty" class="empty" style="display: none">暂无收藏，在详情页点击「收藏」即可加入</div>
    </div>
    <nav class="bottom-nav" aria-label="主导航">
      <a href="/">
        <svg viewBox="0 0 24 24"><path d="M4 10.5L12 4l8 6.5V20a1 1 0 0 1-1 1h-5v-6H10v6H5a1 1 0 0 1-1-1v-9.5z" stroke-linejoin="round" /></svg>
        主页
      </a>
      <a href="/favorites" class="active">
        <svg viewBox="0 0 24 24"><path d="M12 21s-6.7-4.35-9-8.5C1.5 9 3 6 6.5 6 9 6 11 8 12 9.5 13 8 15 6 17.5 6 21 9 22.5 12 21z" stroke-linejoin="round" /></svg>
        收藏
      </a>
      <a href="/profile">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4" /><path d="M6 20v-1c0-2.5 2-4 6-4s6 1.5 6 4v1" stroke-linecap="round" /></svg>
        我的
      </a>
    </nav>
    <script>
      const fetchOpts = { cache: "no-store", headers: { "Cache-Control": "no-cache" } };

      function toast(msg) {
        const t = document.createElement("div");
        t.style.cssText =
          "position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:100001;background:rgba(30,30,30,0.92);color:#fff;padding:12px 18px;border-radius:14px;font-size:14px;max-width:90%;box-shadow:0 8px 24px rgba(0,0,0,0.2)";
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3200);
      }

      function formatRemindHHMM(it) {
        if (it.remind_at_iso) {
          try {
            const d = new Date(it.remind_at_iso);
            if (!isNaN(d.getTime())) {
              const h = String(d.getHours()).padStart(2, "0");
              const m = String(d.getMinutes()).padStart(2, "0");
              return h + ":" + m;
            }
          } catch (e) {}
        }
        return it.remind_at_hhmm || "未设置";
      }

      function initialTimePickerValue(it) {
        if (it.remind_at_iso) {
          try {
            const d = new Date(it.remind_at_iso);
            if (!isNaN(d.getTime())) {
              const h = String(d.getHours()).padStart(2, "0");
              const m = String(d.getMinutes()).padStart(2, "0");
              return h + ":" + m;
            }
          } catch (e) {}
        }
        return it.remind_at_hhmm || "18:30";
      }

      async function updateRemindAt(taskId, hhmm) {
        const resp = await fetch(`/api/tasks/${encodeURIComponent(taskId)}/remind-at`, {
          method: "POST",
          headers: { "Content-Type": "application/json", "Cache-Control": "no-cache" },
          body: JSON.stringify({
            remind_at: hhmm,
            tz_offset_minutes: new Date().getTimezoneOffset()
          }),
          cache: "no-store"
        });
        if (!resp.ok) {
          const text = await resp.text();
          throw new Error(text || "更新提醒失败");
        }
        return await resp.json();
      }

      function makeTimePickerOverlay(taskId, initial, onSave) {
        const overlay = document.createElement("div");
        overlay.style.cssText =
          "position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:99999;display:flex;align-items:flex-end;justify-content:center;padding:12px;";
        const sheet = document.createElement("div");
        sheet.style.cssText =
          "width:100%;max-width:420px;background:#fff;border-radius:16px;padding:12px;box-shadow:0 10px 30px rgba(0,0,0,0.15);";
        const header = document.createElement("div");
        header.style.cssText = "display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;";
        const title = document.createElement("div");
        title.style.fontWeight = "800";
        title.textContent = "修改提醒时间";
        const cancel = document.createElement("button");
        cancel.type = "button";
        cancel.textContent = "取消";
        cancel.style.cssText = "border:1px solid #eee;background:#fff;border-radius:10px;padding:8px 10px;cursor:pointer;";
        cancel.addEventListener("click", () => overlay.remove());
        header.appendChild(title);
        header.appendChild(cancel);
        const row = document.createElement("div");
        row.style.cssText = "display:flex;align-items:center;gap:10px;";
        const picker = document.createElement("input");
        picker.type = "time";
        picker.value = initial;
        picker.style.cssText = "flex:1;padding:10px 8px;border:1px solid #eee;border-radius:12px;";
        const saveBtn = document.createElement("button");
        saveBtn.type = "button";
        saveBtn.textContent = "保存";
        saveBtn.style.cssText =
          "border:1px solid #000;background:#000;color:#fff;border-radius:10px;padding:10px 14px;cursor:pointer;font-weight:700;";
        saveBtn.addEventListener("click", async () => {
          try {
            await onSave(picker.value);
            overlay.remove();
          } catch (e) {
            alert("更新提醒失败：" + (e && e.message ? e.message : e));
          }
        });
        row.appendChild(picker);
        row.appendChild(saveBtn);
        sheet.appendChild(header);
        sheet.appendChild(row);
        overlay.appendChild(sheet);
        overlay.addEventListener("click", (e) => {
          if (e.target === overlay) overlay.remove();
        });
        document.body.appendChild(overlay);
        setTimeout(() => {
          try {
            if (typeof picker.showPicker === "function") picker.showPicker();
          } catch (e) {}
          picker.focus();
        }, 0);
      }

      function extractYouTubeId(url) {
        try {
          const u = new URL(url);
          if (u.hostname.includes("youtu.be")) return u.pathname.replace("/", "").split("/")[0];
          const v = u.searchParams.get("v");
          if (v) return v;
          const parts = u.pathname.split("/").filter(Boolean);
          if (parts[0] === "shorts" || parts[0] === "live") return parts[1] || null;
          return null;
        } catch (e) {
          return null;
        }
      }

      function coverForVideoUrl(videoUrl) {
        const id = extractYouTubeId(videoUrl || "");
        if (!id) return "";
        return `https://img.youtube.com/vi/${id}/maxresdefault.jpg`;
      }

      function bindCoverFallback(img, videoUrl) {
        const id = extractYouTubeId(videoUrl || "");
        if (!id) return;
        img.addEventListener(
          "error",
          function onErr() {
            img.removeEventListener("error", onErr);
            img.src = `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
          },
          { once: true }
        );
      }

      function displayTitleForTask(it) {
        if (it.title) return it.title;
        return "未命名视频";
      }

      function renderStatusPill(status) {
        const pill = document.createElement("div");
        if (status === "done") pill.className = "pill done";
        else if (status === "error") pill.className = "pill error";
        else pill.className = "pill pending";
        pill.textContent = status || "pending";
        pill.addEventListener("click", (e) => e.stopPropagation());
        return pill;
      }

      const alarmSvg = `
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2Z" fill="#9a9a9a"/>
            <path d="M6.88 6.31 5.64 5.07a1 1 0 0 0-1.41 1.41l1.24 1.24A9.96 9.96 0 0 0 2 13h2c0-1.81.65-3.47 1.73-4.78Z" fill="#9a9a9a" opacity="0.35"/>
            <path d="M17.12 17.69 18.36 18.93a1 1 0 0 0 1.41-1.41l-1.24-1.24A9.96 9.96 0 0 0 22 11h-2c0 1.81-.65 3.47-1.73 4.78Z" fill="#9a9a9a" opacity="0.35"/>
            <path d="M12 8v5l3 2" stroke="#9a9a9a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 2a10 10 0 0 0-7.07 17.07A10 10 0 1 0 12 2Z" stroke="#9a9a9a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        `.trim();

      function renderCards(items) {
        const list = document.getElementById("list");
        const empty = document.getElementById("empty");
        list.innerHTML = "";
        if (!items.length) {
          empty.style.display = "";
          return;
        }
        empty.style.display = "none";

        for (const it of items) {
          const card = document.createElement("div");
          card.className = "card";
          card.appendChild(renderStatusPill(it.status));

          const body = document.createElement("div");
          body.className = "card-body";
          const titleText = displayTitleForTask(it);
          const videoUrl = it.video_url || "";
          const coverUrl = coverForVideoUrl(videoUrl);

          if (coverUrl) {
            const media = document.createElement("div");
            media.className = "card-media";
            const img = document.createElement("img");
            img.className = "cover";
            img.loading = "lazy";
            img.alt = titleText;
            img.src = coverUrl;
            bindCoverFallback(img, videoUrl);
            img.style.cursor = "pointer";
            img.addEventListener("click", (e) => {
              e.stopPropagation();
              window.location.href = videoUrl;
            });
            media.appendChild(img);
            body.appendChild(media);
          }

          const goDetail = (e) => {
            if (e) {
              e.preventDefault();
              e.stopPropagation();
            }
            window.location.href = "/detail?id=" + encodeURIComponent(it.id);
          };

          const titleLink = document.createElement("a");
          titleLink.className = "titleLink";
          titleLink.textContent = titleText;
          titleLink.href = "/detail?id=" + encodeURIComponent(it.id);
          titleLink.addEventListener("click", goDetail);
          body.appendChild(titleLink);

          if (it.summary) {
            const summary = document.createElement("div");
            summary.className = "summary";
            summary.textContent = it.summary;
            summary.addEventListener("click", goDetail);
            body.appendChild(summary);
            const hint = document.createElement("div");
            hint.className = "summary-hint";
            hint.textContent = "点击查看全文";
            hint.addEventListener("click", goDetail);
            body.appendChild(hint);
          }

          const meta = document.createElement("div");
          meta.className = "meta metaBtn";
          meta.innerHTML = alarmSvg + "<span>提醒时间：" + formatRemindHHMM(it) + "</span>";
          meta.addEventListener("click", async (e) => {
            e.stopPropagation();
            const taskId = it.id;
            const initial = initialTimePickerValue(it);
            makeTimePickerOverlay(taskId, initial, async (hhmm) => {
              await updateRemindAt(taskId, hhmm);
              toast("提醒时间已更新");
              await load();
            });
          });
          body.appendChild(meta);

          card.appendChild(body);
          list.appendChild(card);
        }
      }

      async function load() {
        const sub = localStorage.getItem("subscription_id");
        const url = sub ? "/api/history?subscription_id=" + encodeURIComponent(sub) : "/api/history";
        const resp = await fetch(url, fetchOpts);
        const data = await resp.json();
        const items = (data.items || []).filter((x) => x.is_favorite);
        renderCards(items);
      }

      load().catch(console.error);
    </script>
  </body>
</html>
